<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UseTrueDeal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0B1120;
      color: white;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      margin-top: 80px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #9CA3AF;
    }

    .search-box {
      margin-top: 30px;
    }

    input {
      width: 60%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 15px 25px;
      margin-left: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg,#3B82F6,#22D3ED);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 15px;
    }

    .price {
      color: #22D3ED;
      font-weight: bold;
    }

  </style>
</head>

<body>

<header>
  <div class="logo">UseTrueDeal</div>
  <div>Login</div>
</header>

<div class="hero">
  <h1>Find exactly what you want</h1>
  <p>Write what you need. We find it.</p>

  <div class="search-box">
    <input placeholder="Example: 2020 Toyota Corolla under $15,000 in Los Angeles">
    <button>Search</button>
  </div>
</div>

<div class="cards">
  <div class="card">
    <h3>iPhone 13</h3>
    <p class="price">$500</p>
  </div>

  <div class="card">
    <h3>Honda Civic 2019</h3>
    <p class="price">$13,200</p>
  </div>

  <div class="card">
    <h3>Apartment LA</h3>
    <p class="price">$2,100/mo</p>
  </div>

  <div class="card">
    <h3>Gaming PC</h3>
    <p class="price">$900</p>
  </div>
</div>

</body>
</html>
