<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UseTrueDeal</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0B1120;
  color:white;
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
}

.logo {
  font-size:26px;
  font-weight:bold;
  background:linear-gradient(90deg,#3B82F6,#22D3ED);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero {
  text-align:center;
  margin-top:80px;
}

.hero h1 {
  font-size:40px;
}

.search-box {
  margin-top:20px;
}

.search-box input {
  width:50%;
  padding:15px;
  border-radius:10px;
  border:none;
}

.search-box button {
  padding:15px 25px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#3B82F6,#22D3ED);
  color:white;
  cursor:pointer;
}

.cards {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:60px;
}

.card {
  background:#1E293B;
  padding:20px;
  border-radius:12px;
  width:200px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 20px rgba(34,211,238,0.4);
}
</style>
</head>

<body>

<header>
  <div class="logo">UseTrueDeal</div>
</header>

<div class="hero">
  <h1>Find exactly what you want</h1>
  <p>Write what you need. We find it.</p>

  <div class="search-box">
    <input id="searchInput" placeholder="Example: cheap car LA under 15000">
    <button onclick="searchItems()">Search</button>
  </div>
</div>

<div class="cards">
  <div class="card">iPhone 13<br>$500</div>
  <div class="card">Honda Civic 2019<br>$13,200</div>
  <div class="card">Apartment LA<br>$2,100/mo</div>
  <div class="card">Gaming PC<br>$900</div>
</div>

<script>
function searchItems(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card=>{
    let text = card.innerText.toLowerCase();

    if(text.includes(input)){
      card.style.display="block";
    } else {
      card.style.display="none";
    }
  });
}
</script>

</body>
</html>
