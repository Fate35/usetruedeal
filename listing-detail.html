<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listing Detail — UseTrueDeal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #1845D1;
      --accent-hover: #1338b0;
      --bg: #F7F8FA;
      --bg-card: #fff;
      --border: #E4E8F0;
      --text-primary: #0A1628;
      --text-muted: #6B7A96;
      --success: #026B40;
      --danger: #9D1B0D;
      --radius: 10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }

    .header-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
    }

    .header-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .header-back:hover { background: var(--bg); color: var(--text-primary); }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      overflow: hidden;
      text-decoration: none;
    }
    .header-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .header-login-link {
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
    }
    .header-login-link:hover { text-decoration: underline; }

    /* ── Banner ── */
    .status-banner {
      display: none;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }
    .status-banner.sold {
      display: block;
      background: #FFF3CD;
      color: #7a5c00;
      border-bottom: 1px solid #f0d060;
    }
    .status-banner.removed {
      display: block;
      background: #fde8e8;
      color: var(--danger);
      border-bottom: 1px solid #f5c0c0;
    }

    /* ── Main layout ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .listing-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 28px;
      align-items: start;
    }

    @media (max-width: 820px) {
      .listing-grid { grid-template-columns: 1fr; }
      .info-panel { position: static !important; }
    }

    /* ── Gallery ── */
    .gallery { display: flex; flex-direction: column; gap: 12px; }

    .gallery-main {
      width: 100%;
      aspect-ratio: 4/3;
      background: #eaecf0;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }

    .gallery-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 8px;
    }
    .gallery-placeholder svg { opacity: 0.4; }

    .gallery-thumbs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .thumb {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }
    .thumb.active { border-color: var(--accent); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── Description ── */
    .description-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-top: 4px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .description-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-primary);
      white-space: pre-wrap;
    }

    /* ── Info Panel ── */
    .info-panel {
      position: sticky;
      top: 72px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
    }

    .listing-price {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .listing-title-panel {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .meta-row svg { flex-shrink: 0; }

    .condition-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: #EEF2FF;
      color: var(--accent);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .btn-outline {
      background: transparent;
      color: var(--text-primary);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: #EEF2FF; }

    .btn-saved {
      background: #EEF2FF;
      color: var(--accent);
      border: 1.5px solid var(--accent);
    }

    .btn-danger-text {
      background: transparent;
      color: var(--danger);
      border: 1.5px solid var(--border);
      font-size: 13px;
      padding: 9px 16px;
    }
    .btn-danger-text:hover { border-color: var(--danger); background: #fde8e8; }

    .action-btns { display: flex; flex-direction: column; gap: 10px; }

    /* ── Seller card ── */
    .seller-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .seller-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .seller-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      overflow: hidden;
      flex-shrink: 0;
      text-decoration: none;
    }
    .seller-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .seller-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .seller-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .btn-view-profile {
      display: block;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      padding: 9px;
      border-radius: 7px;
      border: 1.5px solid var(--accent);
      transition: background 0.15s;
    }
    .btn-view-profile:hover { background: #EEF2FF; }

    /* ── More from seller ── */
    .more-section { margin-top: 28px; }

    .more-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .listing-card-mini {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, transform 0.15s;
      display: block;
    }
    .listing-card-mini:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }

    .listing-card-mini-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: #eaecf0;
      display: block;
    }

    .listing-card-mini-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: #eaecf0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
    }

    .listing-card-mini-body {
      padding: 10px 12px;
    }

    .listing-card-mini-price {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .listing-card-mini-title {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Skeleton ── */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #e8eaf0 25%, #f5f6f8 50%, #e8eaf0 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    .skel-img { width: 100%; aspect-ratio: 4/3; border-radius: var(--radius); }
    .skel-line { height: 14px; margin-bottom: 10px; }
    .skel-line.w60 { width: 60%; }
    .skel-line.w80 { width: 80%; }
    .skel-line.w40 { width: 40%; }
    .skel-line.tall { height: 30px; }

    /* ── Error / Empty ── */
    .error-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .error-state h2 { font-size: 22px; color: var(--text-primary); margin-bottom: 8px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,22,40,0.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg-card);
      border-radius: 14px;
      padding: 28px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .modal-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .radio-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }

    .radio-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      cursor: pointer;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      transition: border-color 0.15s, background 0.15s;
    }
    .radio-label:has(input:checked) {
      border-color: var(--accent);
      background: #EEF2FF;
      color: var(--accent);
    }
    .radio-label input { accent-color: var(--accent); }

    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { flex: 1; }

    .btn-cancel {
      background: var(--bg);
      color: var(--text-primary);
      border: 1.5px solid var(--border);
    }
    .btn-cancel:hover { background: #eaecf0; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #0A1628;
      color: #fff;
      padding: 12px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      z-index: 300;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    /* ── Loading spinner ── */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 60px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <a href="index.html" class="header-logo">UseTrueDeal</a>
  <a href="javascript:history.back()" class="header-back">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back
  </a>
  <span class="header-title" id="headerTitle">Listing Detail</span>
  <div class="header-right" id="headerRight"></div>
</header>

<!-- Status banner -->
<div class="status-banner" id="statusBanner"></div>

<!-- Main -->
<main class="container" id="main">
  <div class="spinner" id="loadingSpinner"></div>
</main>

<!-- Report Modal -->
<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <div class="modal-title">Report Listing</div>
    <div class="modal-subtitle">Why are you reporting this listing?</div>
    <div class="radio-group">
      <label class="radio-label"><input type="radio" name="reportReason" value="Prohibited item" /> Prohibited item</label>
      <label class="radio-label"><input type="radio" name="reportReason" value="Spam" /> Spam</label>
      <label class="radio-label"><input type="radio" name="reportReason" value="Scam" /> Scam</label>
      <label class="radio-label"><input type="radio" name="reportReason" value="Other" /> Other</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" id="reportCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="reportSubmitBtn">Submit Report</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://qohwjeybvfajihljtxrx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFvaHdqZXlidmZhamlobGp0eHJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NjMyNDgsImV4cCI6MjA5MjEzOTI0OH0.YuueGczgwOOOORfcb43kW2CFkLWRK7SYURgfBXFASro';
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const params = new URLSearchParams(location.search);
  const listingId = params.get('id');

  let currentUser = null;
  let listing = null;
  let isSaved = false;
  let images = [];

  // ── Helpers ──────────────────────────────────────────────
  function fmtPrice(p) {
    return '$' + Number(p).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
  }

  function conditionLabel(c) {
    const map = { new: 'New', like_new: 'Like New', good: 'Good', fair: 'Fair', poor: 'Poor' };
    return map[c] || c;
  }

  function initials(name) {
    if (!name) return '?';
    return name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Auth ──────────────────────────────────────────────────
  async function getSession() {
    const { data } = await sb.auth.getSession();
    currentUser = data?.session?.user ?? null;
    renderHeader();
  }

  function renderHeader() {
    const el = document.getElementById('headerRight');
    if (currentUser) {
      const initls = initials(currentUser.user_metadata?.full_name || currentUser.email);
      el.innerHTML = `<a href="profile.html" class="header-avatar" title="My Profile">${escapeHtml(initls)}</a>`;
    } else {
      el.innerHTML = `<a href="login.html" class="header-login-link">Sign in</a>`;
    }
  }

  // ── Load listing ──────────────────────────────────────────
  async function loadListing() {
    if (!listingId) {
      showError('No listing ID provided.');
      return;
    }

    const { data: l, error } = await sb
      .from('listings')
      .select('*')
      .eq('id', listingId)
      .single();

    if (error || !l) {
      showError('Listing not found or no longer available.');
      return;
    }

    listing = l;
    document.title = l.title + ' — UseTrueDeal';
    document.getElementById('headerTitle').textContent = l.title;

    // Status banner
    const banner = document.getElementById('statusBanner');
    if (l.status === 'sold') {
      banner.textContent = 'This item has been sold.';
      banner.className = 'status-banner sold';
    } else if (l.status === 'removed') {
      banner.textContent = 'This listing is no longer available.';
      banner.className = 'status-banner removed';
    }

    // Fetch images
    const { data: imgs } = await sb
      .from('listing_images')
      .select('*')
      .eq('listing_id', listingId)
      .order('position', { ascending: true });

    images = imgs || [];
    if (images.length === 0 && l.image_url) {
      images = [{ url: l.image_url, id: 'fallback' }];
    }

    // Check saved state
    if (currentUser) {
      const { data: saved } = await sb
        .from('saved_listings')
        .select('id')
        .eq('user_id', currentUser.id)
        .eq('listing_id', listingId)
        .maybeSingle();
      isSaved = !!saved;
    }

    // Fetch seller profile
    let seller = null;
    if (l.seller_id) {
      const { data: sp } = await sb
        .from('user_profiles')
        .select('*')
        .eq('id', l.seller_id)
        .maybeSingle();
      seller = sp;
    }

    // Fetch more from seller
    let moreListing = [];
    if (l.seller_id) {
      const { data: more } = await sb
        .from('listings')
        .select('id, title, price, image_url')
        .eq('seller_id', l.seller_id)
        .eq('status', 'active')
        .neq('id', listingId)
        .limit(4);
      moreListing = more || [];
    }

    renderPage(seller, moreListing);
  }

  function showError(msg) {
    document.getElementById('loadingSpinner').remove();
    document.getElementById('main').innerHTML = `
      <div class="error-state">
        <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="color:#CBD2E0;margin:0 auto 16px;display:block"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
        <h2>Not Found</h2>
        <p>${escapeHtml(msg)}</p>
        <a href="index.html" style="color:var(--accent);font-size:14px;font-weight:600;display:inline-block;margin-top:16px;">Browse Listings</a>
      </div>`;
  }

  function renderPage(seller, moreListing) {
    const l = listing;
    const spinner = document.getElementById('loadingSpinner');
    if (spinner) spinner.remove();

    const mainImg = images.length > 0 ? images[0].url : null;

    const galleryHtml = `
      <div class="gallery">
        <div class="gallery-main" id="galleryMain">
          ${mainImg
            ? `<img src="${escapeHtml(mainImg)}" id="mainImage" alt="${escapeHtml(l.title)}" />`
            : `<div class="gallery-placeholder">
                <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                <span style="font-size:13px">No Image</span>
              </div>`}
        </div>
        ${images.length > 1 ? `
          <div class="gallery-thumbs" id="thumbsRow">
            ${images.map((img, i) => `
              <div class="thumb ${i === 0 ? 'active' : ''}" data-idx="${i}" data-url="${escapeHtml(img.url)}">
                <img src="${escapeHtml(img.url)}" alt="Image ${i+1}" loading="lazy" />
              </div>`).join('')}
          </div>` : ''}
      </div>

      <div class="description-card" style="margin-top:20px">
        <div class="section-title">Description</div>
        <div class="description-text">${escapeHtml(l.description || 'No description provided.')}</div>
      </div>
    `;

    const categoryHtml = l.category
      ? `<div class="meta-row"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18"/></svg>${escapeHtml(l.category)}${l.subcategory ? ' › ' + escapeHtml(l.subcategory) : ''}</div>` : '';

    const locationHtml = l.location
      ? `<div class="meta-row"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${escapeHtml(l.location)}</div>` : '';

    const isOwn = currentUser && currentUser.id === l.seller_id;

    const saveBtn = currentUser
      ? `<button class="btn ${isSaved ? 'btn-saved' : 'btn-outline'}" id="saveBtn">
          <svg width="16" height="16" fill="${isSaved ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          ${isSaved ? 'Saved' : 'Save'}
        </button>`
      : `<a href="login.html" class="btn btn-outline">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          Save
        </a>`;

    const msgBtn = isOwn
      ? `<a href="create-listing.html?id=${encodeURIComponent(l.id)}" class="btn btn-outline">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14l4-4h14a2 2 0 002-2V10"/><path d="M18 2l4 4-10 10H8v-4L18 2z"/></svg>
          Edit Listing
        </a>`
      : currentUser
      ? `<button class="btn btn-primary" id="msgBtn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Message Seller
        </button>`
      : `<a href="login.html" class="btn btn-primary">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Message Seller
        </a>`;

    // Seller card
    const sellerName = seller?.full_name || 'UseTrueDeal User';
    const sellerAvatarContent = seller?.avatar_url
      ? `<img src="${escapeHtml(seller.avatar_url)}" alt="${escapeHtml(sellerName)}" />`
      : escapeHtml(initials(sellerName));

    const memberSince = l.created_at ? fmtDate(l.created_at) : '';

    const sellerCardHtml = `
      <div class="seller-card">
        <div class="section-title">Seller</div>
        <div class="seller-row">
          <a href="profile.html?uid=${encodeURIComponent(l.seller_id)}" class="seller-avatar">${sellerAvatarContent}</a>
          <div>
            <div class="seller-name">${escapeHtml(sellerName)}</div>
            <div class="seller-meta">${seller?.company ? escapeHtml(seller.company) + ' · ' : ''}${seller?.location ? escapeHtml(seller.location) + ' · ' : ''}Member since ${memberSince}</div>
          </div>
        </div>
        <a href="profile.html?uid=${encodeURIComponent(l.seller_id)}" class="btn-view-profile">View Profile</a>
      </div>
    `;

    // More from seller
    const moreHtml = moreListing.length > 0 ? `
      <div class="more-section">
        <div class="section-title">More from this seller</div>
        <div class="more-grid">
          ${moreListing.map(ml => `
            <a href="listing-detail.html?id=${encodeURIComponent(ml.id)}" class="listing-card-mini">
              ${ml.image_url
                ? `<img class="listing-card-mini-img" src="${escapeHtml(ml.image_url)}" alt="${escapeHtml(ml.title)}" loading="lazy" />`
                : `<div class="listing-card-mini-img-placeholder"><svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`}
              <div class="listing-card-mini-body">
                <div class="listing-card-mini-price">${fmtPrice(ml.price)}</div>
                <div class="listing-card-mini-title">${escapeHtml(ml.title)}</div>
              </div>
            </a>`).join('')}
        </div>
      </div>` : '';

    const reportLink = currentUser && !isOwn
      ? `<button class="btn btn-danger-text" id="reportBtn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Report Listing
        </button>` : '';

    const infoPanelHtml = `
      <div class="info-panel">
        <div class="info-card">
          <div class="listing-price">${fmtPrice(l.price)}</div>
          <div class="listing-title-panel">${escapeHtml(l.title)}</div>
          ${l.condition ? `<div class="meta-row"><span class="condition-badge">${escapeHtml(conditionLabel(l.condition))}</span></div>` : ''}
          ${locationHtml}
          ${categoryHtml}
          <hr class="divider" />
          <div class="action-btns">
            ${msgBtn}
            ${saveBtn}
            ${reportLink}
          </div>
        </div>
        ${sellerCardHtml}
      </div>
    `;

    document.getElementById('main').innerHTML = `
      <div class="listing-grid">
        <div>
          ${galleryHtml}
          ${moreHtml}
        </div>
        ${infoPanelHtml}
      </div>
    `;

    // Bind events
    bindGallery();
    bindSave();
    bindMessage();
    bindReport();
  }

  function bindGallery() {
    const thumbs = document.querySelectorAll('.thumb');
    thumbs.forEach(t => {
      t.addEventListener('click', () => {
        const url = t.dataset.url;
        const mainImg = document.getElementById('mainImage');
        if (mainImg) {
          mainImg.src = url;
          mainImg.style.opacity = '0';
          mainImg.onload = () => { mainImg.style.opacity = '1'; };
        }
        thumbs.forEach(x => x.classList.remove('active'));
        t.classList.add('active');
      });
    });
  }

  async function bindSave() {
    const btn = document.getElementById('saveBtn');
    if (!btn) return;
    btn.addEventListener('click', async () => {
      btn.disabled = true;
      try {
        if (isSaved) {
          const { error } = await sb
            .from('saved_listings')
            .delete()
            .eq('user_id', currentUser.id)
            .eq('listing_id', listingId);
          if (error) throw error;
          isSaved = false;
          btn.className = 'btn btn-outline';
          btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg> Save`;
          showToast('Removed from saved', '');
        } else {
          const { error } = await sb
            .from('saved_listings')
            .insert({ user_id: currentUser.id, listing_id: listingId });
          if (error) throw error;
          isSaved = true;
          btn.className = 'btn btn-saved';
          btn.innerHTML = `<svg width="16" height="16" fill="currentColor" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg> Saved`;
          showToast('Saved!', 'success');
        }
      } catch (e) {
        showToast('Something went wrong. Try again.', 'error');
      } finally {
        btn.disabled = false;
      }
    });
  }

  async function bindMessage() {
    const btn = document.getElementById('msgBtn');
    if (!btn) return;
    btn.addEventListener('click', async () => {
      btn.disabled = true;
      btn.textContent = 'Opening chat…';
      try {
        const uid = currentUser.id;
        const sellerId = listing.seller_id;

        // Find existing conversation
        const { data: convs } = await sb
          .from('conversations')
          .select('id')
          .eq('listing_id', listingId)
          .or(`and(participant_a.eq.${uid},participant_b.eq.${sellerId}),and(participant_a.eq.${sellerId},participant_b.eq.${uid})`);

        let convId;
        if (convs && convs.length > 0) {
          convId = convs[0].id;
        } else {
          // Create conversation
          const { data: newConv, error: convErr } = await sb
            .from('conversations')
            .insert({
              participant_a: uid,
              participant_b: sellerId,
              listing_id: listingId,
              listing_title: listing.title,
              last_message: "Hi, I'm interested in your listing.",
              last_message_at: new Date().toISOString(),
              last_sender_id: uid,
            })
            .select('id')
            .single();
          if (convErr) throw convErr;
          convId = newConv.id;

          // Insert first message
          await sb.from('messages').insert({
            sender_id: uid,
            recipient_id: sellerId,
            body: "Hi, I'm interested in your listing.",
            read: false,
            conversation_id: convId,
          });
        }

        location.href = `chat.html?cid=${encodeURIComponent(convId)}`;
      } catch (e) {
        showToast('Could not open chat. Try again.', 'error');
        btn.disabled = false;
        btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> Message Seller`;
      }
    });
  }

  function bindReport() {
    const btn = document.getElementById('reportBtn');
    const modal = document.getElementById('reportModal');
    const cancelBtn = document.getElementById('reportCancelBtn');
    const submitBtn = document.getElementById('reportSubmitBtn');

    if (!btn) return;

    btn.addEventListener('click', () => { modal.classList.add('open'); });
    cancelBtn.addEventListener('click', () => { modal.classList.remove('open'); });
    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

    submitBtn.addEventListener('click', async () => {
      const selected = document.querySelector('input[name="reportReason"]:checked');
      if (!selected) { showToast('Please select a reason.', 'error'); return; }
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting…';
      try {
        const { error } = await sb.from('reports').insert({
          reporter_id: currentUser.id,
          target_type: 'listing',
          target_id: listingId,
          reason: selected.value,
        });
        if (error) throw error;
        modal.classList.remove('open');
        showToast('Report submitted. Thank you.', 'success');
      } catch {
        showToast('Failed to submit report.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Report';
      }
    });
  }

  // ── Init ──────────────────────────────────────────────────
  await getSession();
  await loadListing();
</script>
</body>
</html>
